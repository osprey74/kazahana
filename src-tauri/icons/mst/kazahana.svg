<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- 澄み渡る青空のグラデーション（Blueskyを意識した爽やかな青） -->
    <linearGradient id="skyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1A73E8"/>   <!-- 深みのある空の青 -->
      <stop offset="50%" stop-color="#4B90FA"/>  <!-- 鮮やかな青 -->
      <stop offset="100%" stop-color="#8AB4F8"/> <!-- 地平線に近い明るい水色 -->
    </linearGradient>
    
    <!-- 桜の花びらのグラデーション -->
    <linearGradient id="petalGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF0F5"/>   <!-- 光が当たる薄いピンク -->
      <stop offset="100%" stop-color="#FF8EAF"/> <!-- 鮮やかな桜色 -->
    </linearGradient>

    <!-- 風の軌跡を表現する半透明のグラデーション -->
    <linearGradient id="windGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="70%" stop-color="#ffffff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <!-- 花びらの立体感を出すためのドロップシャドウ -->
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="15" dy="25" stdDeviation="15" flood-opacity="0.25" flood-color="#001A4D"/>
    </filter>
  </defs>

  <!-- 背景：アプリアイコンのベース。
       ※実際のアプリ組み込み時は、システム側でクリッピングされることを考慮し、
       必要に応じて rx="230" (角丸) を削除し、完全な正方形として書き出してください。 -->
  <rect width="1024" height="1024" rx="230" fill="url(#skyGradient)"/>

  <!-- 左上から右下へ吹き抜ける風の軌跡 -->
  <path d="M -100,-100 Q 400,300 1200,1000" fill="none" stroke="url(#windGradient)" stroke-width="80" stroke-linecap="round" opacity="0.3"/>
  <path d="M 100,-200 Q 500,200 1300,900" fill="none" stroke="url(#windGradient)" stroke-width="40" stroke-linecap="round" opacity="0.2"/>
  <path d="M -300,100 Q 200,500 1000,1200" fill="none" stroke="url(#windGradient)" stroke-width="30" stroke-linecap="round" opacity="0.15"/>

  <!-- 風に舞う光の粒子（キラキラとした表現） -->
  <circle cx="280" cy="220" r="10" fill="white" opacity="0.6" />
  <circle cx="450" cy="380" r="14" fill="white" opacity="0.4" />
  <circle cx="380" cy="500" r="8" fill="white" opacity="0.5" />
  <circle cx="680" cy="480" r="12" fill="white" opacity="0.3" />
  <circle cx="780" cy="720" r="16" fill="white" opacity="0.2" />

  <!-- 舞い落ちる1枚の桜の花びら -->
  <!-- transformで中心からやや右下に配置し、風に流される角度に回転させています -->
  <g transform="translate(620, 580) rotate(125) scale(5)" filter="url(#shadow)">
    <!-- 桜の花びらの形状（上が先端の切れ込み、下が根元） -->
    <path d="M0,60 C-40,20 -50,-30 -20,-50 C-10,-57 0,-40 0,-40 C0,-40 10,-57 20,-50 C50,-30 40,20 0,60 Z" fill="url(#petalGradient)" />
    <!-- ほのかなハイライト -->
    <path d="M-5,45 C-30,15 -35,-25 -15,-40" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  </g>
</svg>